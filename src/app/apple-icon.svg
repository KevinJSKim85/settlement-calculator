<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <radialGradient id="goldBodyL" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFE89A"/>
      <stop offset="55%" stop-color="#E8B94A"/>
      <stop offset="100%" stop-color="#8A5A12"/>
    </radialGradient>
    <radialGradient id="goldInnerL" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFF3C0"/>
      <stop offset="65%" stop-color="#F6DA9D"/>
      <stop offset="100%" stop-color="#B07F2A"/>
    </radialGradient>
  </defs>

  <!-- Background padding so icon has safe margin for iOS masking -->
  <rect width="180" height="180" fill="#1A1A1A"/>

  <!-- Outer rim -->
  <circle cx="90" cy="90" r="82" fill="url(#goldBodyL)" stroke="#5A3A0A" stroke-width="3"/>

  <!-- Edge accent segments -->
  <g fill="#4A2E08">
    <rect x="84" y="3" width="12" height="20" rx="2"/>
    <rect x="84" y="157" width="12" height="20" rx="2"/>
    <rect x="3" y="84" width="20" height="12" rx="2"/>
    <rect x="157" y="84" width="20" height="12" rx="2"/>
    <rect x="84" y="3" width="12" height="20" rx="2" transform="rotate(45 90 90)"/>
    <rect x="84" y="3" width="12" height="20" rx="2" transform="rotate(-45 90 90)"/>
    <rect x="84" y="157" width="12" height="20" rx="2" transform="rotate(45 90 90)"/>
    <rect x="84" y="157" width="12" height="20" rx="2" transform="rotate(-45 90 90)"/>
  </g>

  <!-- Inner ring -->
  <circle cx="90" cy="90" r="58" fill="url(#goldInnerL)" stroke="#7A5214" stroke-width="2.5"/>

  <!-- Center emblem -->
  <text x="90" y="118" text-anchor="middle" fill="#5A3A0A" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="900">₩</text>
</svg>
