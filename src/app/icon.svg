<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="goldBody" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFE89A"/>
      <stop offset="55%" stop-color="#E8B94A"/>
      <stop offset="100%" stop-color="#8A5A12"/>
    </radialGradient>
    <radialGradient id="goldInner" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFF3C0"/>
      <stop offset="65%" stop-color="#F6DA9D"/>
      <stop offset="100%" stop-color="#B07F2A"/>
    </radialGradient>
  </defs>

  <!-- Outer rim -->
  <circle cx="16" cy="16" r="15" fill="url(#goldBody)" stroke="#5A3A0A" stroke-width="0.6"/>

  <!-- Edge accent segments (8 evenly spaced dark wedges) -->
  <g fill="#4A2E08">
    <rect x="15" y="0.6" width="2" height="3.2" rx="0.4"/>
    <rect x="15" y="28.2" width="2" height="3.2" rx="0.4"/>
    <rect x="0.6" y="15" width="3.2" height="2" rx="0.4"/>
    <rect x="28.2" y="15" width="3.2" height="2" rx="0.4"/>
    <rect x="15" y="0.6" width="2" height="3.2" rx="0.4" transform="rotate(45 16 16)"/>
    <rect x="15" y="0.6" width="2" height="3.2" rx="0.4" transform="rotate(-45 16 16)"/>
    <rect x="15" y="28.2" width="2" height="3.2" rx="0.4" transform="rotate(45 16 16)"/>
    <rect x="15" y="28.2" width="2" height="3.2" rx="0.4" transform="rotate(-45 16 16)"/>
  </g>

  <!-- Inner ring -->
  <circle cx="16" cy="16" r="10.5" fill="url(#goldInner)" stroke="#7A5214" stroke-width="0.5"/>

  <!-- Center emblem: dollar-like ₩ mark -->
  <text x="16" y="21" text-anchor="middle" fill="#5A3A0A" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-weight="900" letter-spacing="-0.5">₩</text>
</svg>
